name: Build Linux Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Build reason'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build with CentOS 7 Docker
      uses: addnab/docker-run-action@v3
      with:
        image: centos:7
        options: -v ${{ github.workspace }}:/app
        run: |
          # Install EPEL and dependencies
          yum install -y epel-release
          yum install -y python3 python3-devel gcc gcc-c++ libsndfile-devel make

          # Install pip
          python3 -m ensurepip --upgrade

          # Install Python dependencies
          pip3 install --upgrade pip
          pip3 install numpy scipy matplotlib Pillow pyyaml tabulate soundfile tqdm uvicorn fastapi python-multipart pyinstaller

          # Install AutoEq package
          cd /app
          pip3 install -e .

          # Build executable with PyInstaller
          python3 -m PyInstaller --onefile --name autoeq_api \
            --add-data "autoeq/*.py:autoeq" \
            --hidden-import=autoeq \
            --hidden-import=autoeq.api \
            --hidden-import=autoeq.batch_processing \
            --hidden-import=autoeq.constants \
            --hidden-import=autoeq.csv \
            --hidden-import=autoeq.frequency_response \
            --hidden-import=autoeq.peq \
            --hidden-import=autoeq.rest_api \
            --hidden-import=autoeq.utils \
            --hidden-import=uvicorn \
            --hidden-import=fastapi \
            --hidden-import=numpy \
            --hidden-import=scipy \
            --hidden-import=matplotlib \
            --hidden-import=PIL \
            --hidden-import=yaml \
            --hidden-import=tabulate \
            --hidden-import=soundfile \
            --hidden-import=tqdm \
            main.py
          
    - name: Verify build
      run: |
        ls -la dist/
        file dist/autoeq_api
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: autoeq-linux-x64
        path: dist/autoeq_api
        retention-days: 30
        if-no-files-found: error
        
    - name: Test executable
      run: |
        timeout --signal=SIGINT 5 ./dist/autoeq_api || echo "Test completed - service started successfully"